<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Edit Modal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body>
    <div class="container mt-5">
        <h2>Test Edit Modal Functionality</h2>
        <table class="table">
            <thead>
                <tr>
                    <th>MR Name</th>
                    <th>Product</th>
                    <th>Target</th>
                    <th>Achievement</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Mangal Pandey</td>
                    <td>Cetrizin</td>
                    <td>100</td>
                    <td>0</td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="testEditTarget(1)">
                            <i class="bi bi-pencil"></i> Edit
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- EDIT TARGET MODAL -->
    <div class="modal fade" id="editTargetModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bi bi-pencil-square"></i> Edit Target Achievement
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editTargetForm">
                        <input type="hidden" id="editTargetId" />

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">MR Name</label>
                                    <input type="text" class="form-control" id="editMRName" readonly disabled />
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Product Name</label>
                                    <input type="text" class="form-control" id="editProductName" readonly disabled />
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Target (Units)</label>
                                    <input type="number" class="form-control" id="editSalesTarget" readonly disabled />
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Sales Achievement (Units)</label>
                                    <input type="number" class="form-control" id="editSalesAchievement" min="0"
                                        required />
                                </div>
                            </div>
                        </div>

                        <div class="alert alert-info">
                            <i class="bi bi-info-circle me-2"></i>
                            <strong>Achievement will be calculated automatically:</strong><br>
                            Achievement % = (Sales Achievement / Target) × 100
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="updateTargetBtn">
                        <i class="bi bi-check-circle"></i> Update Achievement
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Test data
        const testTarget = {
            id: 1,
            mrName: 'Mangal Pandey',
            productName: 'Cetrizin',
            targetUnits: 100,
            achievedUnits: 0
        };

        function testEditTarget(targetId) {
            console.log('=== TEST EDIT TARGET CALLED ===');
            console.log('Target ID:', targetId);
            console.log('Bootstrap available:', typeof bootstrap !== 'undefined');

            // Populate modal
            document.getElementById('editTargetId').value = testTarget.id;
            document.getElementById('editMRName').value = testTarget.mrName;
            document.getElementById('editProductName').value = testTarget.productName;
            document.getElementById('editSalesTarget').value = testTarget.targetUnits;
            document.getElementById('editSalesAchievement').value = testTarget.achievedUnits;

            console.log('Fields populated');

            // Show modal
            const modalEl = document.getElementById('editTargetModal');
            console.log('Modal element:', modalEl);

            if (modalEl) {
                const modal = new bootstrap.Modal(modalEl);
                console.log('Modal instance created:', modal);
                modal.show();
                console.log('Modal.show() called');
            } else {
                alert('Modal element not found!');
            }
        }

        // Wire update button
        document.addEventListener('DOMContentLoaded', () => {
            const updateBtn = document.getElementById('updateTargetBtn');
            if (updateBtn) {
                updateBtn.addEventListener('click', () => {
                    const achievement = document.getElementById('editSalesAchievement').value;
                    alert(`Update clicked! Achievement value: ${achievement}`);

                    // Close modal
                    const modalEl = document.getElementById('editTargetModal');
                    const modal = bootstrap.Modal.getInstance(modalEl);
                    if (modal) modal.hide();
                });
            }
        });

        // Expose to global scope
        window.testEditTarget = testEditTarget;
    </script>
</body>

</html>
